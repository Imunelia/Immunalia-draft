name: Publish Immunalia Draft Preview

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: immunalia-draft-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download draft branch of Immunalia
        uses: actions/checkout@v4
        with:
          repository: Imunelia/imunelia-app
          ref: draft
          path: site

      - name: Mark site as draft
        shell: bash
        run: |
          cat > site/draft-banner.js <<'EOF'
          document.addEventListener('DOMContentLoaded', function () {
            const banner = document.createElement('div');
            banner.textContent = 'DRAFT – PRACOVNÍ VERZE, NENÍ ZVEŘEJNĚNO';
            banner.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:999999;background:#9b1c1c;color:white;text-align:center;padding:8px 12px;font:700 14px/1.3 Arial,sans-serif;box-shadow:0 2px 8px rgba(0,0,0,.25)';
            document.body.style.paddingTop = '38px';
            document.body.prepend(banner);
          });
          EOF
          find site -maxdepth 1 -name '*.html' -type f -print0 | while IFS= read -r -d '' file; do
            sed -i 's#</body>#<script src="draft-banner.js"></script></body>#' "$file"
          done
          rm -rf site/.git site/.github

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload preview site
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy preview site
        id: deployment
        uses: actions/deploy-pages@v4

